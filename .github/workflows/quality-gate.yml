name: quality-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npm run test
      - run: npm run lint
      - run: npm audit
      - run: npm run build
      - run: npm run data:audit
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          MKT53_E2E_PORT: 3030
          MKT53_E2E_REUSE_EXISTING: 0
